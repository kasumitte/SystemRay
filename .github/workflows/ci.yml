name: Release and Tests

on:
    push:
        branches: [ main, master ]
        tags:
            - "v*"
    pull_request:
        branches: [ main, master ]

jobs:
    tests:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          
          - name: Install uv
            uses: astral-sh/setup-uv@v5

          - name: Install Python
            run: uv python install 3.13
          
          - name: Install dependencies
            run: uv sync --all-groups

          - name: Run test
            run: uv run pytest tests/

    build_apps:
      name: Build for ${{ matrix.os }}
      needs: tests
      if: startsWith(github.ref, 'refs/tags/v')
      runs-on: ${{ matrix.os }}
      strategy:
        matrix:
          include:
            - os: windows-latest
              artifact_name: SystemRay-Win.exe
              pyinstaller_cmd: pyinstaller --onefile --windowed --add-data "assets;assets" --add-data "languages;languages" --icon=assets/main_icon.ico main.py
              output_bin: dist/main.exe

            - os: ubuntu-latest
              artifact_name: SystemRay-Linux
              pyinstaller_cmd: pyinstaller --onefile --add-data "assets:assets" --add-data "languages:languages" main.py
              output_bin: dist/main

            - os: macos-latest
              artifact_name: SystemRay-Mac
              pyinstaller_cmd: pyinstaller --onefile --windowed --add-data "assets:assets" --add-data "languages:languages" main.py
              output_bin: dist/main
      
      steps:
        - name: Checkout repo
          uses: actions/checkout@v4
        
        - name: Install uv
          run: astral-sh/setup-uv@v5
            
        - name: Install Python
          run: uv python install 3.13

        - name: Install dependencies
          run: uv sync --all-groups

        - name: Build app
          run: uv run ${{ matrix.output_bin }} dist/${{ matrix.artifact_name }}

        - name: Rename bin
          shell: bash
          run: mv ${{ matrix.output_bin }} dist/${{ matrix.artifact_name }}

        - name: Upload built bin
          uses: actions/upload-artifact@v4
          with:
            name: ${{ matrix.artifact_name }}
            path: dist/${{ matrix.artifact_name }}
        
    create_release:
      name: Create GitHub release
      needs: build_apps
      runs-on: ubuntu-latest
      if: startsWith(github.ref, 'refs/tags/v')
      steps:
        - name: Download all built artifacts
          uses: actions/download-artifact@v4
          with:
            path: artifacts

        - name: Create release
          uses: softprops/action-gh-release@v2
          with:
            files: |
              artifacts/SystemRay-Win.exe/SystemRay-Win.exe
              artifacts/SystemRay-Linux/SystemRay-Linux
              artifacts/SystemRay-Mac/SystemRay-Mac

          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
     